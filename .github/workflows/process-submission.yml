name: Process Submission

on:
  issues:
    types: [opened]

jobs:
  process:
    if: startsWith(github.event.issue.title, '[submission]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y whois dnsutils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract domain from issue title
        id: extract
        run: |
          TITLE="${{ github.event.issue.title }}"
          DOMAIN="${TITLE#\[submission\] }"
          DOMAIN=$(echo "$DOMAIN" | tr '[:upper:]' '[:lower:]' | xargs)
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

      - name: Parse submission JSON from issue body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "$ISSUE_BODY" > /tmp/submission.json
          python3 -c "
          import json, sys
          try:
              data = json.load(open('/tmp/submission.json'))
              print('display_name=' + data.get('display_name', ''))
              print('display_loc='  + data.get('display_loc', ''))
          except Exception as e:
              print('display_name=')
              print('display_loc=')
          " >> $GITHUB_OUTPUT

      - name: Run whois-deep
        env:
          DOMAIN: ${{ steps.extract.outputs.domain }}
        run: |
          python3 whois-deep.py -d "$DOMAIN" -o "web/data/domains/${DOMAIN}.json" --no-cache

      - name: Merge display metadata and update index.json
        env:
          DOMAIN: ${{ steps.extract.outputs.domain }}
          DISPLAY_NAME: ${{ steps.parse.outputs.display_name }}
          DISPLAY_LOC:  ${{ steps.parse.outputs.display_loc }}
        run: |
          python3 - <<'PYEOF'
          import json, os, datetime

          domain       = os.environ['DOMAIN']
          display_name = os.environ.get('DISPLAY_NAME', '')
          display_loc  = os.environ.get('DISPLAY_LOC', '')
          now          = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          domain_file  = f'web/data/domains/{domain}.json'
          index_file   = 'web/data/index.json'

          # Merge display fields into domain file
          with open(domain_file) as f:
              data = json.load(f)
          data['display_name']   = display_name or 'anonymous'
          data['display_loc']    = display_loc
          data['last_refreshed'] = now
          with open(domain_file, 'w') as f:
              json.dump(data, f, indent=2)

          # Extract index fields
          ip    = data.get('ip_whois', {})
          cidr  = ip.get('cidr', {})
          entry = {
              'domain':        domain,
              'display_name':  display_name or 'anonymous',
              'display_loc':   display_loc,
              'queried_at':    data.get('queried_at', now),
              'last_refreshed': now,
              'rir':           ip.get('rir'),
              'asn':           ip.get('asn'),
              'org':           ip.get('org_name'),
              'country':       ip.get('country'),
              'netblock':      cidr.get('cidr_notation'),
              'ip_range':      ip.get('inetnum'),
          }

          # Upsert into index.json
          try:
              with open(index_file) as f:
                  index = json.load(f)
          except Exception:
              index = {'total_domains': 0, 'domains': []}

          existing = [d for d in index.get('domains', []) if d['domain'] != domain]
          existing.append(entry)
          existing.sort(key=lambda d: d['domain'])
          index['domains']       = existing
          index['total_domains'] = len(existing)
          with open(index_file, 'w') as f:
              json.dump(index, f, indent=2)

          print(f'[OK] {domain} added/updated in index.json')
          PYEOF

      - name: Commit data
        env:
          DOMAIN: ${{ steps.extract.outputs.domain }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/
          git diff --cached --quiet || git commit -m "data: add $DOMAIN [skip ci]"
          git push

      - name: Close issue with confirmation
        uses: actions/github-script@v7
        env:
          DOMAIN: ${{ steps.extract.outputs.domain }}
        with:
          script: |
            const domain = process.env.DOMAIN;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **${domain}** processed and added to the [RIR Board](https://fmfalgun.github.io/whois-deep/rir-board.html).`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
